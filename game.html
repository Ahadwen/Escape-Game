<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escape - Browser Game</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f3f4f6;
        font-family: Arial, sans-serif;
      }

      .wrap {
        width: min(96vw, 1180px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .info {
        margin: 0 0 12px;
        color: #cbd5e1;
      }

      canvas {
        width: 100%;
        height: auto;
        display: block;
        border: 2px solid #334155;
        border-radius: 10px;
        background: #0f172a;
      }

      .controls {
        margin-top: 10px;
        color: #94a3b8;
        font-size: 14px;
      }

      .meta {
        margin-top: 8px;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        color: #94a3b8;
        font-size: 13px;
      }

      button {
        appearance: none;
        border: 1px solid #475569;
        background: #1e293b;
        color: #e2e8f0;
        padding: 6px 10px;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #334155;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Escape</h1>
      <p class="info">Survive hunters, use abilities, collect heals, and last as long as possible.</p>
      <canvas id="game" width="1120" height="700"></canvas>
      <p class="controls">Move: Arrows | Camera: A/D pan, S recenter | Abilities: Q dash, W speed burst, E decoy | Restart: R</p>
      <div class="meta">
        <button id="snapshot-folder-button" type="button">Choose Snapshot Folder</button>
        <span id="snapshot-status">Death screenshots: download fallback active</span>
      </div>
    </main>

    <script src="./src/escape/standalone.js"></script>
  </body>
</html>
