<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escape - Browser Game</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f3f4f6;
        font-family: Arial, sans-serif;
      }

      .wrap {
        width: min(96vw, 1180px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .info {
        margin: 0 0 12px;
        color: #cbd5e1;
      }

      canvas {
        width: 100%;
        height: auto;
        display: block;
        border: 2px solid #334155;
        border-radius: 10px;
        background: #0f172a;
      }

      .controls {
        margin-top: 10px;
        color: #94a3b8;
        font-size: 14px;
      }

      .meta {
        margin-top: 8px;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        color: #94a3b8;
        font-size: 13px;
      }

      button {
        appearance: none;
        border: 1px solid #475569;
        background: #1e293b;
        color: #e2e8f0;
        padding: 6px 10px;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #334155;
      }

      .play-row {
        display: flex;
        gap: 18px;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .canvas-col {
        flex: 1 1 560px;
        min-width: 0;
      }

      .sim-panel {
        flex: 0 0 148px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #475569;
        background: linear-gradient(165deg, #1e293b 0%, #0f172a 100%);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
      }

      .sim-panel label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #94a3b8;
        margin-bottom: 8px;
      }

      .sim-panel input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #64748b;
        background: #0f172a;
        color: #f1f5f9;
        font-size: 16px;
        font-variant-numeric: tabular-nums;
      }

      .sim-panel input:focus {
        outline: none;
        border-color: #38bdf8;
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.25);
      }

      .sim-panel .hint {
        margin: 10px 0 0;
        font-size: 11px;
        line-height: 1.45;
        color: #64748b;
      }

      .sim-panel .accent {
        color: #38bdf8;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Escape</h1>
      <p class="info">Survive hunters, use abilities, collect heals, and last as long as possible.</p>
      <div class="play-row">
        <div class="canvas-col">
          <canvas id="game" width="1120" height="700"></canvas>
        </div>
        <aside class="sim-panel" aria-label="Practice speed">
          <label for="game-speed">Sim speed</label>
          <input
            id="game-speed"
            type="number"
            value="1"
            min="0.1"
            max="5"
            step="0.05"
            inputmode="decimal"
            title="Multiplies simulation time (1 = normal, 1.1 = 10% faster, 0.7 = 30% slower)"
          />
          <p class="hint"><span class="accent">1</span> = normal · <span class="accent">1.1</span> faster · <span class="accent">0.7</span> slower</p>
        </aside>
      </div>
      <p class="controls">Move: Arrows | Camera: A/D pan, S recenter | Abilities: Q dash, W speed burst, E decoy | Restart: R</p>
      <div class="meta">
        <button id="snapshot-folder-button" type="button">Choose Snapshot Folder</button>
        <span id="snapshot-status">Death screenshots: download fallback active</span>
      </div>
    </main>

    <script src="./src/escape/standalone.js"></script>
  </body>
</html>
